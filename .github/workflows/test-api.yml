name: API Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          cd apps/docker
          docker compose -f docker-compose.yaml build postgres redis api

      - name: Start API (and deps if needed)
        run: |
          cd apps/docker
          docker compose -f docker-compose.yaml up -d postgres redis api

      - name: Wait for API to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/v1/api/health > /dev/null; then
              echo "API is up!"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker ps
          cd apps/docker && docker compose -f docker-compose.yaml logs api
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api.mind-spark.ru/requirements/test.txt

      - name: Run health test
        run: |
          cd apps/api.mind-spark.ru
          pytest

      - name: Compose down
        if: always()
        run: |
          cd apps/docker
          docker compose -f docker-compose.yaml down -v