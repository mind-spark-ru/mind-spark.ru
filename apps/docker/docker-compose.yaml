services:
  postgres:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: mindspark-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    build:
      context: .
      dockerfile: redis.Dockerfile
    container_name: mindspark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
volumes:
  postgres_data:
  redis_data:
networks:
  app-network:
    driver: bridge