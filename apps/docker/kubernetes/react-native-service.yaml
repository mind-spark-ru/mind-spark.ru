apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o kubernetes/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: react-native
  name: react-native
spec:
  ports:
    - name: "8081"
      port: 8081
      targetPort: 8081
    - name: "19001"
      port: 19001
      targetPort: 19001
    - name: "19002"
      port: 19002
      targetPort: 19002
  selector:
    io.kompose.service: react-native
