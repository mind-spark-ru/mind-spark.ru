apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o kubernetes/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: ml
  name: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ml
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o kubernetes/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: ml
    spec:
      containers:
        - image: ml
          name: mindspark-ml
          ports:
            - containerPort: 8001
              protocol: TCP
          volumeMounts:
            - mountPath: /app/app
              name: ml-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: ml-cm0
          name: ml-cm0
