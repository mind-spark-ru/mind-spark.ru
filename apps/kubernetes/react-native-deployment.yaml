apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml -o kubernetes/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: react-native
  name: react-native
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: react-native
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml -o kubernetes/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: react-native
    spec:
      containers:
        - args:
            - sh
            - -c
            - ' npx expo start --dev-client --tunnel --port 8081 --clear '
          env:
            - name: EXPO_DEBUG
              value: "true"
          image: react-native
          name: mindspark-react-native
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 19001
              protocol: TCP
            - containerPort: 19002
              protocol: TCP
          stdin: true
          tty: true
      restartPolicy: Always
